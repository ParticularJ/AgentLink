# 务实型冷启动模板
type: 务实型
description: 数据多、措施实、少套话
tone: 实事求是
keywords:
  - 数据
  - 落实
  - 抓手
  - 成效
  - 实干
structure:
  opening: 直接切入主题，不绕弯子
