# 热点仓策略配置
# 四大策略体系：首次涨停板、涨停回调、热门板块龙头、次新股

# ============================================
# 资金管理
# ============================================
capital_management:
  # 热点仓占总资金比例（根据市场环境动态调整）
  hot_spot_ratio: 0.25           # 默认25%
  hot_spot_ratio_range:          # 可调范围
    min: 0.15                    # 低迷期15%
    max: 0.30                    # 情绪高涨期30%
  
  # 单只股票限制
  max_single_position_pct: 0.30  # 单只最大占热点仓30%
  max_positions: 3               # 最多同时持有3只
  
  # 次新股特殊限制
  new_stock_max_pct: 0.05        # 次新股最大占热点仓5%
  new_stock_max_count: 1         # 次新股最多持有1只

# ============================================
# 熔断机制
# ============================================
fuse_mechanism:
  # 一级熔断：禁止开新仓
  level1_loss_pct: 1.5           # 日亏损达1.5%
  
  # 二级熔断：强制清仓，停止交易
  level2_loss_pct: 2.0           # 日亏损达2%
  
  # 连续熔断惩罚
  consecutive_fuse_days: 2       # 连续2日触发二级熔断
  suspend_days: 3                # 暂停交易3天

# ============================================
# 评分门槛
# ============================================
score_thresholds:
  first_limit_up: 75             # 策略一：首次涨停板
  limit_up_retrace: 65           # 策略二：涨停回调
  sector_leader: 70              # 策略三：热门板块龙头
  new_stock: 80                  # 策略四：次新股

# ============================================
# 持股周期（天数）
# ============================================
holding_periods:
  first_limit_up: 5              # 首次涨停板
  limit_up_retrace: 7            # 涨停回调
  sector_leader: 8               # 板块龙头
  new_stock: 3                   # 次新股

# ============================================
# 加仓规则
# ============================================
add_position_rules:
  # 允许加仓的策略
  allowed_strategies:
    - limit_up_retrace           # 策略二
    - sector_leader              # 策略三
  
  # 加仓条件
  conditions:
    min_unrealized_pct: 5.0      # 浮盈≥5%
    max_hold_days: 3             # 持有≤3天
    require_weak_to_strong: true # 需要分时弱转强
    require_sector_flow: true    # 需要板块回流
  
  # 加仓参数
  add_ratio_range:               # 加仓比例范围
    min: 0.20
    max: 0.30
  max_add_times: 1               # 最多加仓1次

# ============================================
# 每日推荐
# ============================================
daily_recommendation:
  max_results: 3                 # 每日最多推荐3只
  new_stock_max: 1               # 次新股最多占1席
  min_score_for_recommend: 65    # 最低推荐分数

# ============================================
# 市场环境判断
# ============================================
market_environment:
  # 大盘判断
  index_ma20_threshold: 0.0      # 大盘20日线判断阈值
  
  # 市场情绪
  sentiment_levels:
    hot: 85                      # 情绪高涨（热点仓可达30%）
    normal: 70                   # 情绪正常（热点仓25%）
    cold: 50                     # 情绪低迷（热点仓15%）

# ============================================
# 板块热度计算
# ============================================
sector_heat:
  # 板块入围条件
  min_score: 75                  # 板块热度≥75分
  consecutive_days: 2            # 连续2日≥70分
  require_above_ma20: true       # 板块指数>20日线
  
  # 板块排名
  top_n_sectors: 5               # 关注前5名板块
