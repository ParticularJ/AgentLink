# 热点仓交易Agent配置

name: hot-spot-agent
description: 热点仓交易策略Agent，执行四大策略扫描、评分、买入、监控和复盘

skills:
  - hot-spot-strategy

# Agent能力定义
capabilities:
  - name: scan_strategies
    description: 扫描四大策略（首次涨停板、涨停回调、板块龙头、次新股）
    parameters:
      - name: date
        type: string
        description: 扫描日期（默认今日）
        required: false
  
  - name: generate_recommendations
    description: 生成每日推荐标的
    parameters:
      - name: max_results
        type: integer
        description: 最大推荐数量（默认3只）
        required: false
  
  - name: execute_buy
    description: 执行买入操作
    parameters:
      - name: stock_code
        type: string
        description: 股票代码
        required: true
      - name: strategy
        type: string
        description: 策略类型
        required: true
      - name: entry_price
        type: float
        description: 买入价格
        required: true
  
  - name: monitor_positions
    description: 监控持仓状态
    parameters:
      - name: mode
        type: string
        description: 监控模式（intraday/daily/special）
        required: false
  
  - name: execute_sell
    description: 执行卖出操作
    parameters:
      - name: stock_code
        type: string
        description: 股票代码
        required: true
      - name: sell_price
        type: float
        description: 卖出价格
        required: true
      - name: ratio
        type: float
        description: 卖出比例（0-1）
        required: false
  
  - name: daily_review
    description: 执行每日复盘
    parameters: []
  
  - name: add_position
    description: 执行加仓操作
    parameters:
      - name: stock_code
        type: string
        description: 股票代码
        required: true
      - name: add_price
        type: float
        description: 加仓价格
        required: true

# 触发词
triggers:
  - 热点仓
  - 热点策略
  - 扫描热点
  - 推荐标的
  - 监控持仓
  - 每日复盘
  - 加仓

# 默认参数
defaults:
  total_capital: 1000000.0
  hot_spot_ratio: 0.25
  max_positions: 3
  max_single_position_pct: 0.30
